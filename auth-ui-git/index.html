<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Custom styles -->
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <div class="auth-card">

    <!-- Brand -->
    <div class="brand-icon">
      <i class="bi bi-shield-lock-fill"></i>
    </div>
    <h2>Bienvenido de nuevo</h2>
    <p class="subtitle">Inicia sesión en tu cuenta</p>

    <!-- Alert -->
    <div id="loginAlert" class="alert alert-auth mb-3" role="alert"></div>

    <!-- Form -->
    <form id="loginForm" novalidate onsubmit="handleLogin(event)">

      <!-- Username -->
      <div class="mb-3">
        <label for="loginUsername" class="form-label">
          <i class="bi bi-person me-1 text-muted"></i>Usuario
        </label>
        <input
          type="text"
          id="loginUsername"
          class="form-control"
          placeholder="Ingresa tu usuario"
          autocomplete="username"
          required
        />
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="loginPassword" class="form-label">
          <i class="bi bi-lock me-1 text-muted"></i>Contraseña
        </label>
        <div class="input-group">
          <input
            type="password"
            id="loginPassword"
            class="form-control"
            placeholder="Ingresa tu contraseña"
            autocomplete="current-password"
            required
          />
          <button
            type="button"
            id="toggleLoginPwd"
            class="btn btn-toggle-pwd"
            aria-label="Mostrar / ocultar contraseña"
            onclick="togglePassword('loginPassword', 'toggleLoginPwd')"
          >
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" id="loginBtn" class="btn btn-primary-custom mt-1">
        <span id="loginSpinner" class="btn-spinner"></span>
        <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar Sesión
      </button>

    </form>

    <!-- Divider -->
    <div class="divider">¿No tienes cuenta?</div>

    <p class="text-center mb-0" style="font-size:.9rem;">
      <a href="register.html" class="auth-link">
        <i class="bi bi-person-plus me-1"></i>Crear una cuenta nueva
      </a>
    </p>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Auth logic -->
  
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('auth_logged_in') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
